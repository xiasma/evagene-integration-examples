[project]
name = "notebook-explorer"
version = "0.1.0"
description = "Evagene integration example: Jupyter / Quarto what-if risk explorer."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "httpx==0.27.2",
    "ipywidgets==8.1.5",
    "jupyter==1.1.1",
    "matplotlib==3.9.2",
    "nbconvert==7.16.4",
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.3",
    "ruff==0.7.4",
    "mypy==1.13.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["notebook_explorer*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
# Notebook JSON is generated by ``_build_notebook.py``; lint that instead.
extend-exclude = ["explorer.ipynb", "_build_notebook.py"]

[tool.ruff.lint]
select = [
    "E", "F", "W", "I", "B", "UP", "SIM", "RET", "N", "C4", "PL", "RUF",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["PLR2004"]
"notebook_explorer/client.py" = ["PLR0913"]

[tool.mypy]
strict = true
python_version = "3.11"
files = ["notebook_explorer", "tests"]
exclude = ["_build_notebook.py"]
